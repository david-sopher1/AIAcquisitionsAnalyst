version: "3.9"

# DealEngine — full stack on one box.
# Production: move Postgres to managed (RDS/Cloud SQL), Temporal to Temporal
# Cloud, and run api/workers/dashboard on Cloud Run or ECS. See docs/04-deployment.md.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dealengine
      POSTGRES_PASSWORD: dealengine
      POSTGRES_DB: dealengine
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealengine"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - redisdata:/data

  temporal:
    image: temporalio/auto-setup:1.24
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: dealengine
      POSTGRES_PWD: dealengine
      POSTGRES_SEEDS: postgres
    ports: ["7233:7233"]
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.26.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports: ["8080:8080"]
    depends_on: [temporal]

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dealengine:dealengine@postgres:5432/dealengine
      REDIS_URL: redis://redis:6379
      TEMPORAL_ADDRESS: temporal:7233
    ports: ["4000:4000"]
    depends_on:
      postgres:
        condition: service_healthy

  workers:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dealengine:dealengine@postgres:5432/dealengine
      REDIS_URL: redis://redis:6379
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    env_file: .env
    environment:
      API_INTERNAL_URL: http://api:4000
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pgdata:
  redisdata:
